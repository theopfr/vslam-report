project:
  type: website

website:
  title: "V-SLAM"
  favicon: assets/favicon.ico
  navbar:
    background: dark
    foreground: light
    logo-alt: "V-SLAM"
    title: "V-SLAM"
    left:
      - href: index.qmd
        text: "🏠 Einführung"
      - href: theorie.qmd
        text: "📐 Theorie"
      - href: orb-slam3.qmd
        text: "🔬 ORB-SLAM3"
      - href: methoden.qmd
        text: "⚖️ Methoden"
      - href: demo.qmd
        text: "🎮 Demo & Quiz"
    right:
      - icon: github
        href: https://github.com/theopfr/vslam-report
        aria-label: GitHub
  page-footer:
    background: dark
    left: "Visual Computing – Hochschule München | SS 2026"
    right: "Thema 9: V-SLAM Algorithmen"
  reader-mode: false

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    toc-title: "Inhalt"
    code-fold: true
    code-tools: true
    code-copy: true
    smooth-scroll: true
    number-sections: false
    link-external-icon: true
    link-external-newwindow: true
    fig-align: center
    fig-width: 9
    fig-height: 5

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl
