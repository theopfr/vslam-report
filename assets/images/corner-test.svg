  <!-- ── p: single tip pixel at (5,4) = x=140, y=118 ── -->
  <rect x="140" y="118" width="21" height="21" fill="rgba(125,255,178,0.5)" stroke="#cfe7d8" stroke-width="1.5"/>
  <text x="151" y="133" text-anchor="middle" font-style="italic" font-size="11" fill="#cfe7d8">p</text>

  <!-- ── short straight arrow from grid right edge to strip left edge ── -->
  <line x1="290" y1="120" x2="410" y2="120"
        stroke="#22c55e" stroke-width="2"
        marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════
       STRIP — 16 cells
       Bright: pixels 6–12 (i=5..11)
       Dim: 1–5 (i=0..4) and 13–16 (i=12..15)
  ════════════════════════════════════ -->
  <rect x="429" y="108" width="352" height="24" fill="none" stroke="#e63030" stroke-width="2" rx="1"/>

  <g fill="rgba(207,231,216,0.09)">
    <rect x="430" y="109" width="21" height="22"/><!-- 1  dim -->
    <rect x="452" y="109" width="21" height="22"/><!-- 2  dim -->
    <rect x="474" y="109" width="21" height="22"/><!-- 3  dim -->
    <rect x="496" y="109" width="21" height="22"/><!-- 4  dim -->
    <rect x="518" y="109" width="21" height="22"/><!-- 5  dim -->
  </g>
  <g fill="rgba(125,255,178,0.5)">
    <rect x="540" y="109" width="21" height="22"/><!-- 6  bright -->
    <rect x="562" y="109" width="21" height="22"/><!-- 7  bright -->
    <rect x="584" y="109" width="21" height="22"/><!-- 8  bright -->
    <rect x="606" y="109" width="21" height="22"/><!-- 9  bright -->
    <rect x="628" y="109" width="21" height="22"/><!-- 10 bright -->
    <rect x="650" y="109" width="21" height="22"/><!-- 11 bright -->
    <rect x="672" y="109" width="21" height="22"/><!-- 12 bright -->
  </g>
  <g fill="rgba(207,231,216,0.09)">
    <rect x="694" y="109" width="21" height="22"/><!-- 13 dim -->
    <rect x="716" y="109" width="21" height="22"/><!-- 14 dim -->
    <rect x="738" y="109" width="21" height="22"/><!-- 15 dim -->
    <rect x="760" y="109" width="21" height="22"/><!-- 16 dim -->
  </g>

  <g stroke="rgba(207,231,216,0.18)" stroke-width="0.7">
    <line x1="452" y1="109" x2="452" y2="131"/><line x1="474" y1="109" x2="474" y2="131"/>
    <line x1="496" y1="109" x2="496" y2="131"/><line x1="518" y1="109" x2="518" y2="131"/>
    <line x1="540" y1="109" x2="540" y2="131"/><line x1="562" y1="109" x2="562" y2="131"/>
    <line x1="584" y1="109" x2="584" y2="131"/><line x1="606" y1="109" x2="606" y2="131"/>
    <line x1="628" y1="109" x2="628" y2="131"/><line x1="650" y1="109" x2="650" y2="131"/>
