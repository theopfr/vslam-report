<svg viewBox="0 0 790 310" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!--
    GRID: 11×11, cell=22px, origin (30,30)
    x = 30+col*22,  y = 30+row*22

    PYRAMID: apex = p = (col=5, row=4), slope=3 (fans out fast below)
      row 4  (y=118): col 5 only        ← p, single pixel tip
      row 5  (y=140): cols 2–8
      row 6  (y=162): cols 0–10 (full)
      rows 7–10: full

    RING (Bresenham r=3 clockwise from top around p=(5,4)):
       1:(5,1) 2:(6,1) 3:(7,2) 4:(8,3)  5:(8,4) 6:(8,5) 7:(7,6) 8:(6,7)
       9:(5,7) 10:(4,7) 11:(3,6) 12:(2,5) 13:(2,4) 14:(2,3) 15:(3,2) 16:(4,1)

    ON pyramid: 6,7,8,9,10,11,12  (7 consecutive bright)
    OFF pyramid: 1,2,3,4,5,13,14,15,16
  -->

  <!-- ── 11×11 neutral grid ── -->
  <g fill="rgba(207,231,216,0.04)" stroke="rgba(207,231,216,0.10)" stroke-width="0.5">
