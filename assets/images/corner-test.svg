    <rect x="30"  y="52"  width="21" height="21"/><rect x="52"  y="52"  width="21" height="21"/><rect x="74"  y="52"  width="21" height="21"/><rect x="96"  y="52"  width="21" height="21"/><rect x="118" y="52"  width="21" height="21"/><rect x="140" y="52"  width="21" height="21"/><rect x="162" y="52"  width="21" height="21"/><rect x="184" y="52"  width="21" height="21"/><rect x="206" y="52"  width="21" height="21"/><rect x="228" y="52"  width="21" height="21"/><rect x="250" y="52"  width="21" height="21"/>
    <rect x="30"  y="74"  width="21" height="21"/><rect x="52"  y="74"  width="21" height="21"/><rect x="74"  y="74"  width="21" height="21"/><rect x="96"  y="74"  width="21" height="21"/><rect x="118" y="74"  width="21" height="21"/><rect x="140" y="74"  width="21" height="21"/><rect x="162" y="74"  width="21" height="21"/><rect x="184" y="74"  width="21" height="21"/><rect x="206" y="74"  width="21" height="21"/><rect x="228" y="74"  width="21" height="21"/><rect x="250" y="74"  width="21" height="21"/>
    <rect x="30"  y="96"  width="21" height="21"/><rect x="52"  y="96"  width="21" height="21"/><rect x="74"  y="96"  width="21" height="21"/><rect x="96"  y="96"  width="21" height="21"/><rect x="118" y="96"  width="21" height="21"/><rect x="140" y="96"  width="21" height="21"/><rect x="162" y="96"  width="21" height="21"/><rect x="184" y="96"  width="21" height="21"/><rect x="206" y="96"  width="21" height="21"/><rect x="228" y="96"  width="21" height="21"/><rect x="250" y="96"  width="21" height="21"/>
    <rect x="30"  y="118" width="21" height="21"/><rect x="52"  y="118" width="21" height="21"/><rect x="74"  y="118" width="21" height="21"/><rect x="96"  y="118" width="21" height="21"/><rect x="118" y="118" width="21" height="21"/><rect x="140" y="118" width="21" height="21"/><rect x="162" y="118" width="21" height="21"/><rect x="184" y="118" width="21" height="21"/><rect x="206" y="118" width="21" height="21"/><rect x="228" y="118" width="21" height="21"/><rect x="250" y="118" width="21" height="21"/>
    <rect x="30"  y="140" width="21" height="21"/><rect x="52"  y="140" width="21" height="21"/><rect x="74"  y="140" width="21" height="21"/><rect x="96"  y="140" width="21" height="21"/><rect x="118" y="140" width="21" height="21"/><rect x="140" y="140" width="21" height="21"/><rect x="162" y="140" width="21" height="21"/><rect x="184" y="140" width="21" height="21"/><rect x="206" y="140" width="21" height="21"/><rect x="228" y="140" width="21" height="21"/><rect x="250" y="140" width="21" height="21"/>
    <rect x="30"  y="162" width="21" height="21"/><rect x="52"  y="162" width="21" height="21"/><rect x="74"  y="162" width="21" height="21"/><rect x="96"  y="162" width="21" height="21"/><rect x="118" y="162" width="21" height="21"/><rect x="140" y="162" width="21" height="21"/><rect x="162" y="162" width="21" height="21"/><rect x="184" y="162" width="21" height="21"/><rect x="206" y="162" width="21" height="21"/><rect x="228" y="162" width="21" height="21"/><rect x="250" y="162" width="21" height="21"/>
    <rect x="30"  y="184" width="21" height="21"/><rect x="52"  y="184" width="21" height="21"/><rect x="74"  y="184" width="21" height="21"/><rect x="96"  y="184" width="21" height="21"/><rect x="118" y="184" width="21" height="21"/><rect x="140" y="184" width="21" height="21"/><rect x="162" y="184" width="21" height="21"/><rect x="184" y="184" width="21" height="21"/><rect x="206" y="184" width="21" height="21"/><rect x="228" y="184" width="21" height="21"/><rect x="250" y="184" width="21" height="21"/>
    <rect x="30"  y="206" width="21" height="21"/><rect x="52"  y="206" width="21" height="21"/><rect x="74"  y="206" width="21" height="21"/><rect x="96"  y="206" width="21" height="21"/><rect x="118" y="206" width="21" height="21"/><rect x="140" y="206" width="21" height="21"/><rect x="162" y="206" width="21" height="21"/><rect x="184" y="206" width="21" height="21"/><rect x="206" y="206" width="21" height="21"/><rect x="228" y="206" width="21" height="21"/><rect x="250" y="206" width="21" height="21"/>
    <rect x="30"  y="228" width="21" height="21"/><rect x="52"  y="228" width="21" height="21"/><rect x="74"  y="228" width="21" height="21"/><rect x="96"  y="228" width="21" height="21"/><rect x="118" y="228" width="21" height="21"/><rect x="140" y="228" width="21" height="21"/><rect x="162" y="228" width="21" height="21"/><rect x="184" y="228" width="21" height="21"/><rect x="206" y="228" width="21" height="21"/><rect x="228" y="228" width="21" height="21"/><rect x="250" y="228" width="21" height="21"/>
    <rect x="30"  y="250" width="21" height="21"/><rect x="52"  y="250" width="21" height="21"/><rect x="74"  y="250" width="21" height="21"/><rect x="96"  y="250" width="21" height="21"/><rect x="118" y="250" width="21" height="21"/><rect x="140" y="250" width="21" height="21"/><rect x="162" y="250" width="21" height="21"/><rect x="184" y="250" width="21" height="21"/><rect x="206" y="250" width="21" height="21"/><rect x="228" y="250" width="21" height="21"/><rect x="250" y="250" width="21" height="21"/>
