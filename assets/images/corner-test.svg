    <line x1="716" y1="109" x2="716" y2="131"/><line x1="738" y1="109" x2="738" y2="131"/>
    <line x1="760" y1="109" x2="760" y2="131"/>
  </g>

  <g text-anchor="middle" font-size="8" fill="rgba(207,231,216,0.40)">
    <text x="441"  y="143">1</text><text x="463"  y="143">2</text>
    <text x="485"  y="143">3</text><text x="507"  y="143">4</text>
    <text x="529"  y="143">5</text><text x="551"  y="143">6</text>
    <text x="573"  y="143">7</text><text x="595"  y="143">8</text>
    <text x="617"  y="143">9</text><text x="639"  y="143">10</text>
    <text x="661"  y="143">11</text><text x="683"  y="143">12</text>
    <text x="705"  y="143">13</text><text x="727"  y="143">14</text>
    <text x="749"  y="143">15</text><text x="771"  y="143">16</text>
  </g>

  <text x="151" y="290" text-anchor="middle" font-size="16" fill="rgba(207,231,216,0.6)">FAST ring around p</text>
  <text x="605" y="165" text-anchor="middle" font-size="16" fill="rgba(207,231,216,0.6)">pixels 13 to 5 are all darker → corner</text>
