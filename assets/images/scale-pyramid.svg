<svg viewBox="0 0 660 330" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
    .cap { fill: rgba(207,231,216,0.6);  font-size: 16px; }
    .lbl { fill: #cfe7d8;                 font-size: 12px; }
    .dim { fill: rgba(207,231,216,0.45);  font-size: 11px; }
    .grn { fill: #7dffb2; }
  </style>
  <defs>
    <pattern id="img" width="11" height="11" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="rgba(207,231,216,0.03)"
            stroke="rgba(207,231,216,0.07)" stroke-width="0.4"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <path d="M0 0 L7 3.5 L0 7 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ── legend: detector window ── -->
  <circle cx="48" cy="62" r="8" fill="none" stroke="rgba(207,231,216,0.5)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="64" y="66" class="cap" font-size="9">FAST Corner Detection Circle (constant size)</text>

  <!-- ══════════════ Level 0 · 1.00 ══════════════ -->
  <rect x="40" y="80" width="170" height="170" fill="url(#img)" stroke="rgba(207,231,216,0.25)" stroke-width="1"/>
  <rect x="87.6" y="151.4" width="96.9" height="98.6" fill="rgba(207,231,216,0.10)" stroke="rgba(207,231,216,0.30)" stroke-width="1.2"/>
  <circle cx="87.6" cy="151.4" r="20" fill="none" stroke="rgba(207,231,216,0.4)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="125" y="269" text-anchor="middle" class="lbl">Level 0</text>

  <!-- downscale arrow -->
  <line x1="210" y1="184" x2="236" y2="184" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════ Level 1 · 0.80 ══════════════ -->
  <rect x="236" y="118" width="132" height="132" fill="url(#img)" stroke="rgba(207,231,216,0.25)" stroke-width="1"/>
  <rect x="272.96" y="173.44" width="75.24" height="76.56" fill="rgba(207,231,216,0.10)" stroke="rgba(207,231,216,0.30)" stroke-width="1.2"/>
  <circle cx="272.96" cy="173.44" r="20" fill="none" stroke="rgba(207,231,216,0.4)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="302" y="269" text-anchor="middle" class="lbl">Level 1</text>

  <line x1="368" y1="199" x2="394" y2="199" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════ Level 2 · 0.64  (detected) ══════════════ -->
  <rect x="394" y="148" width="102" height="102" fill="url(#img)" stroke="#7dffb2" stroke-width="1.4"/>
  <rect x="422.56" y="190.84" width="58.14" height="59.16" fill="rgba(125,255,178,0.10)" stroke="rgba(125,255,178,0.45)" stroke-width="1.2"/>
  <circle cx="422.56" cy="190.84" r="20" fill="none" stroke="#7dffb2" stroke-width="2"/>
  <circle cx="422.56" cy="190.84" r="3.6" fill="#7dffb2"/>
  <text x="445" y="140" text-anchor="middle" class="grn" font-size="12">sharp → detected ✓</text>
  <text x="445" y="269" text-anchor="middle" class="lbl">Level 2</text>

  <line x1="496" y1="210" x2="522" y2="210" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════ Level 3 · 0.51 ══════════════ -->
  <rect x="522" y="170" width="80" height="80" fill="url(#img)" stroke="rgba(207,231,216,0.25)" stroke-width="1"/>
  <rect x="544.4" y="203.6" width="45.6" height="46.4" fill="rgba(207,231,216,0.10)" stroke="rgba(207,231,216,0.30)" stroke-width="1.2"/>
  <circle cx="544.4" cy="203.6" r="20" fill="none" stroke="rgba(207,231,216,0.4)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="562" y="269" text-anchor="middle" class="lbl">Level 3</text>

  <!-- ── caption ── -->
  <text x="321" y="314" text-anchor="middle" class="cap">image shrinks per level → scale invariance</text>
</svg>
