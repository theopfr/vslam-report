<svg viewBox="0 34 920 306" xmlns="http://www.w3.org/2000/svg">
  <style>
    text{font-family:'IBM Plex Mono',ui-monospace,monospace;}
    .ttl{fill:#7dffb2;font-size:13px;font-weight:600;letter-spacing:0.08em;}
    .sub{fill:rgba(207,231,216,0.6);font-size:11px;}
    .note{fill:rgba(207,231,216,0.8);font-size:11px;}
    .frame{fill:rgba(125,255,178,0.025);stroke:rgba(0,255,136,0.3);stroke-width:1;}
    .kp{fill:rgba(125,255,178,0.85);}
    .match{stroke:rgba(125,255,178,0.45);stroke-width:1.4;fill:none;}
    .match-hi{stroke:#7dffb2;stroke-width:2;fill:none;}
    .reject{stroke:rgba(255,138,138,0.5);stroke-width:1.4;stroke-dasharray:4 3;fill:none;}
    .cell{rx:2;}
    .on{fill:#7dffb2;}
    .off{fill:none;stroke:rgba(207,231,216,0.3);stroke-width:1;}
    .diff{stroke:#ff8a8a;stroke-width:2;}
    .mono{fill:#7dffb2;font-size:12px;}
  </style>

  <!-- frames -->
  <rect x="24"  y="46" width="380" height="180" rx="6" class="frame"/>
  <rect x="516" y="46" width="380" height="180" rx="6" class="frame"/>
  <text x="34"  y="64" class="sub">frame Fₜ</text>
  <text x="526" y="64" class="sub">frame Fₜ₋₁</text>

  <!-- matching lines (left keypoint -> right keypoint), spread into distinct bands -->
  <line x1="95"  y1="85"  x2="610" y2="95"  class="match"/>
  <line x1="300" y1="155" x2="800" y2="150" class="match"/>
  <line x1="220" y1="200" x2="740" y2="195" class="match"/>
  <!-- highlighted query pair -->
  <line x1="160" y1="125" x2="660" y2="120" class="match-hi"/>

  <!-- left keypoints -->
  <circle cx="95"  cy="85"  r="4" class="kp"/>
  <circle cx="300" cy="155" r="4" class="kp"/>
  <circle cx="220" cy="200" r="4" class="kp"/>
  <!-- right keypoints -->
  <circle cx="610" cy="95"  r="4" class="kp"/>
  <circle cx="800" cy="150" r="4" class="kp"/>
  <circle cx="740" cy="195" r="4" class="kp"/>

  <!-- highlighted query + match -->
  <circle cx="160" cy="125" r="6" fill="#7dffb2"/>
  <circle cx="160" cy="125" r="9" fill="none" stroke="#fff" stroke-width="1"/>
  <text x="160" y="113" text-anchor="middle" class="sub">q</text>
  <circle cx="660" cy="120" r="6" fill="#7dffb2"/>
  <circle cx="660" cy="120" r="9" fill="none" stroke="#fff" stroke-width="1"/>
  <text x="660" y="108" text-anchor="middle" class="sub">p</text>

  <!-- descriptor comparison for the q–p pair -->
  <text x="24" y="264" class="sub">descriptors (12 of 256 bits):</text>

  <text x="44" y="294" class="mono">q</text>
  <rect class="cell on"  x="70"  y="284" width="14" height="14"/>
  <rect class="cell off" x="87"  y="284" width="14" height="14"/>
  <rect class="cell on"  x="104" y="284" width="14" height="14"/>
  <rect class="cell on"  x="121" y="284" width="14" height="14"/>
  <rect class="cell off diff" x="138" y="284" width="14" height="14"/>
  <rect class="cell on"  x="155" y="284" width="14" height="14"/>
  <rect class="cell off" x="172" y="284" width="14" height="14"/>
  <rect class="cell off" x="189" y="284" width="14" height="14"/>
  <rect class="cell on"  x="206" y="284" width="14" height="14"/>
  <rect class="cell on diff"  x="223" y="284" width="14" height="14"/>
  <rect class="cell on"  x="240" y="284" width="14" height="14"/>
  <rect class="cell off" x="257" y="284" width="14" height="14"/>

  <text x="44" y="318" class="mono">p</text>
  <rect class="cell on"  x="70"  y="308" width="14" height="14"/>
  <rect class="cell off" x="87"  y="308" width="14" height="14"/>
  <rect class="cell on"  x="104" y="308" width="14" height="14"/>
  <rect class="cell on"  x="121" y="308" width="14" height="14"/>
  <rect class="cell on diff"  x="138" y="308" width="14" height="14"/>
  <rect class="cell on"  x="155" y="308" width="14" height="14"/>
  <rect class="cell off" x="172" y="308" width="14" height="14"/>
  <rect class="cell off" x="189" y="308" width="14" height="14"/>
  <rect class="cell on"  x="206" y="308" width="14" height="14"/>
  <rect class="cell off diff" x="223" y="308" width="14" height="14"/>
  <rect class="cell on"  x="240" y="308" width="14" height="14"/>
  <rect class="cell off" x="257" y="308" width="14" height="14"/>

  <text x="300" y="297" class="note">Hamming distance = 2 (differing bits, in red)</text>
  <text x="300" y="315" class="note">→ smallest over all candidates in Fₜ ⇒ the match</text>
</svg>
