<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #070b09;
    color: #d7e6dc;
    letter-spacing: 0.06em;
  }

  .tl {
    display: flex;
    padding: 1rem 1.5rem 2rem;
    max-width: 700px;
  }

  .track-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 32px;
    flex-shrink: 0;
    position: relative;
    margin-right: 1.5rem;
  }

  .track-bg {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: rgba(0, 255, 136, 0.15);
  }

  .track-fill {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: #00ff88;
    height: 0;
    pointer-events: none;
    box-shadow: 0 0 6px rgba(0, 255, 136, 0.5);
  }

  .handle {
    position: absolute;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #0b0f0e;
    border: 1.5px solid #00ff88;
    box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
    cursor: grab;
    z-index: 10;
    top: 0;
    transition: box-shadow 0.1s;
    user-select: none;
  }
  .handle:active {
    cursor: grabbing;
    box-shadow: 0 0 16px rgba(0, 255, 136, 0.9);
  }

  .steps-col { flex: 1; }

  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;

    opacity: 1;
    transition: none;
  }
  .step.visible { opacity: 1; }

  .step-img {
    width: 130px;
    height: 98px;
    flex-shrink: 0;
    border-radius: 4px;

    background: #0f1513;
    border: 1px solid #2a3a33;

    opacity: 1;
    filter: none;
  }
  .step-img svg { width: 100%; height: 100%; display: block; }

  .step-text { flex: 1; padding-top: 2px; }

  .step-num {
    font-size: 10px;
    color: rgba(0, 255, 136, 0.4);
    font-weight: 400;
    margin-bottom: 4px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .step-title {
    font-size: 15px;
    font-weight: 600;
    color: #eafff1;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-shadow: none;
  }

  .step-desc {
    font-size: 13px;
    color: #cfded4;
    line-height: 1.7;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

    <div class="track-fill" id="track-fill"></div>
    <div class="handle" id="handle"></div>
  </div>
  <div class="steps-col" id="steps-col"></div>

const steps = [
  { label: "Images",           title: "Image capture",            desc: "The camera captures a continuous stream of frames. Each frame is a 2D grid of pixel intensities - the raw input to the entire vSLAM pipeline." },
  { label: "ORB features",     title: "ORB feature extraction",   desc: "Distinctive keypoints (corners, blobs) are detected and each is encoded as a compact binary descriptor. ORB is fast enough to run in real time on embedded hardware." },
  { label: "Feature matching", title: "Feature matching",         desc: "Descriptors from consecutive frames are compared by Hamming distance. Matched pairs identify the same real-world point seen from two positions. RANSAC removes outliers." },
  { label: "Camera motion",    title: "Camera motion estimation", desc: "From the matched pairs, the essential matrix is solved to recover the relative rotation R and translation t between frames - the camera's movement in space." },
  { label: "Triangulation",    title: "Triangulation",            desc: "Each matched pair defines two optical rays. Where they intersect gives the 3D position of that landmark. Depth is recovered without any active sensor." },
  { label: "Point cloud",      title: "Sparse point cloud map",   desc: "All triangulated landmarks accumulate into a sparse 3D map. The sequence of estimated poses forms the camera trajectory. Loop closure corrects drift when a place is revisited." },
];

const n = steps.length;
const stepsCol = document.getElementById('steps-col');
const trackCol = document.getElementById('track-col');
const trackFill = document.getElementById('track-fill');
const handle = document.getElementById('handle');

stepsCol.innerHTML = steps.map((s, i) => `
  <div class="step" id="step-${i}">
    <div class="step-img">${svgs[i]}</div>
    <div class="step-text">
      <div class="step-num">Step ${i + 1} / ${n} - ${s.label}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
  </div>
`).join('');

function getStepCenters() {
  const trackRect = trackCol.getBoundingClientRect();
  return Array.from({ length: n }, (_, i) => {
    const el = document.getElementById('step-' + i);
    const r = el.getBoundingClientRect();
    return r.top - trackRect.top + r.height / 2;
  });
}

function reveal(count) {
  count = Math.max(0, Math.min(n, count));
  const centers = getStepCenters();
  const trackH = trackCol.getBoundingClientRect().height;

  let handleY;
  if (count === 0) {
    handleY = centers[0] - (centers[1] - centers[0]) * 0.5;
  } else if (count >= n) {
    handleY = centers[n - 1] + (centers[n - 1] - centers[n - 2]) * 0.3;
  } else {
    handleY = (centers[count - 1] + centers[count]) / 2;
  }

  handleY = Math.max(10, Math.min(trackH - 10, handleY));
  handle.style.top = handleY + 'px';
  trackFill.style.height = handleY + 'px';

  for (let i = 0; i < n; i++) {
    document.getElementById('step-' + i).classList.toggle('visible', i < count);
  }
}

function yFromEvent(e) {
  const r = trackCol.getBoundingClientRect();
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return Math.max(0, Math.min(r.height, y));
}

function snapCount(y) {
  const centers = getStepCenters();
  let count = 0;
  for (let i = 0; i < n; i++) {
    const threshold = i === 0 ? centers[0] * 0.6 : (centers[i - 1] + centers[i]) / 2;
    if (y >= threshold) count = i + 1;
  }
  return count;
}

let dragging = false;
handle.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
handle.addEventListener('touchstart', () => dragging = true, { passive: true });
document.addEventListener('mousemove', e => { if (dragging) reveal(snapCount(yFromEvent(e))); });
document.addEventListener('touchmove', e => { if (dragging) reveal(snapCount(yFromEvent(e))); }, { passive: true });
document.addEventListener('mouseup', () => dragging = false);
document.addEventListener('touchend', () => dragging = false);
trackCol.addEventListener('click', e => reveal(snapCount(yFromEvent(e))));

setTimeout(() => reveal(1), 50);
</script>

</html>
