<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #111; }

  .tl { padding: 2rem 1.5rem; max-width: 780px; }

  .track-wrap {
    position: relative;
    height: 2px;
    background: #ddd;
    margin: 0 12px 3.5rem;
    cursor: pointer;
  }
  .track-progress { height: 100%; background: #111; width: 0; pointer-events: none; }
  .handle {
    position: absolute;
    top: 50%;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #111;
    transform: translate(-50%, -50%);
    cursor: grab;
    transition: transform 0.1s;
    user-select: none;
  }
  .handle:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.3); }

  .dot-group { position: absolute; top: 50%; transform: translateY(-50%); }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    border: 1.5px solid #bbb; background: #fff;
    transform: translateX(-50%);
    transition: border-color 0.2s, background 0.2s;
  }
  .dot.on { background: #111; border-color: #111; }
  .dot-label {
    position: absolute; top: 12px; left: 0;
    transform: translateX(-50%);
    font-size: 12px; color: #aaa; white-space: nowrap;
    transition: color 0.2s;
  }
  .dot-label.on { color: #111; font-weight: 600; }

  .card {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    min-height: 120px;
  }
  .card-img {
    width: 140px;
    height: 105px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e8e8e8;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 6px;
  }
  .placeholder svg { opacity: 0.25; }
  .placeholder span { font-size: 11px; color: #aaa; }

  .card-text { flex: 1; padding-top: 2px; }
  .card-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: #111; }
  .card-desc { font-size: 14px; color: #555; line-height: 1.7; }
</style>
</head>
<body>
<div class="tl">
  <div class="track-wrap" id="track">
    <div class="track-progress" id="progress"></div>
    <div id="dots"></div>
    <div class="handle" id="handle"></div>
  </div>
  <div class="card" id="card"></div>
</div>

<script>
const steps = [
  {
    label: "Images",
    title: "Image capture",
    desc: "The camera captures a continuous stream of frames. Each frame is a 2D grid of pixel intensities - the raw input to the entire vSLAM pipeline.",
    img: "" // e.g. "images/01_capture.jpg"
  },
  {
    label: "ORB features",
    title: "ORB feature extraction",
    desc: "Distinctive keypoints (corners, blobs) are detected and each is encoded as a compact binary descriptor. ORB is fast enough to run in real time on embedded hardware.",
    img: ""
  },
  {
    label: "Feature matching",
    title: "Feature matching",
    desc: "Descriptors from consecutive frames are compared by Hamming distance. Matched pairs identify the same real-world point seen from two positions. RANSAC removes outliers.",
    img: ""
  },
  {
    label: "Camera motion",
    title: "Camera motion estimation",
    desc: "From the matched pairs, the essential matrix is solved to recover the relative rotation R and translation t between frames - the camera's movement in space.",
    img: ""
  },
  {
    label: "Triangulation",
    title: "Triangulation",
    desc: "Each matched pair defines two optical rays. Where they intersect gives the 3D position of that landmark. Depth is recovered without any active sensor.",
    img: ""
  },
  {
    label: "Point cloud",
    title: "Sparse point cloud map",
    desc: "All triangulated landmarks accumulate into a sparse 3D map. The sequence of estimated poses forms the camera trajectory. Loop closure corrects drift when a place is revisited.",
    img: ""
  },
];

const placeholderSVGs = [
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>`,
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/><line x1="5" y1="7" x2="5" y2="17"/></svg>`,
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>`,
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><polygon points="12 2 22 20 2 20"/><line x1="12" y1="8" x2="12" y2="13"/></svg>`,
  `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><circle cx="7" cy="7" r="1.5"/><circle cx="14" cy="5" r="1.5"/><circle cx="18" cy="11" r="1.5"/><circle cx="10" cy="13" r="1.5"/><circle cx="5" cy="16" r="1.5"/><circle cx="16" cy="18" r="1.5"/><circle cx="12" cy="9" r="1"/></svg>`,
];

const n = steps.length;
const track = document.getElementById('track');
const handle = document.getElementById('handle');
const progress = document.getElementById('progress');
const dotsEl = document.getElementById('dots');
const card = document.getElementById('card');

dotsEl.innerHTML = steps.map((s, i) => {
  const pct = i / (n - 1) * 100;
  return `<div class="dot-group" style="left:${pct}%">
    <div class="dot" id="dot-${i}"></div>
    <div class="dot-label" id="lbl-${i}">${s.label}</div>
  </div>`;
}).join('');

function render(idx) {
  const pct = idx / (n - 1) * 100;
  handle.style.left = pct + '%';
  progress.style.width = pct + '%';
  for (let i = 0; i < n; i++) {
    document.getElementById('dot-' + i).className = 'dot' + (i <= idx ? ' on' : '');
    document.getElementById('lbl-' + i).className = 'dot-label' + (i === idx ? ' on' : '');
  }
  const s = steps[idx];
  const imgContent = s.img
    ? `<img src="${s.img}" alt="${s.title}">`
    : `<div class="placeholder">${placeholderSVGs[idx]}<span>add image</span></div>`;
  card.innerHTML = `
    <div class="card-img">${imgContent}</div>
    <div class="card-text">
      <div class="card-title">${s.title}</div>
      <div class="card-desc">${s.desc}</div>
    </div>`;
}

function pctFromEvent(e) {
  const r = track.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  return Math.max(0, Math.min(1, x / r.width));
}

function snap(pct) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < n; i++) {
    const d = Math.abs(i / (n - 1) - pct);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

let dragging = false;
handle.addEventListener('mousedown', () => dragging = true);
handle.addEventListener('touchstart', () => dragging = true, { passive: true });
document.addEventListener('mousemove', e => { if (dragging) render(snap(pctFromEvent(e))); });
document.addEventListener('touchmove', e => { if (dragging) render(snap(pctFromEvent(e))); }, { passive: true });
document.addEventListener('mouseup', () => dragging = false);
document.addEventListener('touchend', () => dragging = false);
track.addEventListener('click', e => render(snap(pctFromEvent(e))));

render(0);
</script>
</body>
</html>
