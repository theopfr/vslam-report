<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  background: transparent;
  color: #cfe7d8;
  letter-spacing: 0.04em;
}
.wrap { max-width: 720px; margin: 0 auto; padding: 1rem; }

canvas#scene {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid rgba(0, 255, 136, 0.35);
  border-radius: 8px;
  background: #0b0f0e;
  cursor: crosshair;
  box-shadow: 0 0 18px rgba(0, 255, 136, 0.08);
}

.hint {
  text-align: center;
  font-size: 11px;
  color: rgba(207, 231, 216, 0.5);
  margin-top: 0.5rem;
  letter-spacing: 0.06em;
}

.panel {
  margin-top: 0.9rem;
  display: grid; grid-template-columns: auto 1fr; gap: 0.9rem 1.2rem; align-items: center;
  border: 1px solid rgba(0, 255, 136, 0.25); border-radius: 6px;
  padding: 0.8rem 0.9rem; background: rgba(12, 18, 16, 0.6);
}
.matrix {
  display: inline-grid; grid-template-columns: repeat(3, 1fr); gap: 2px 10px;
  font-size: 11px; color: #7dffb2;
  border-left: 2px solid rgba(0, 255, 136, 0.4); border-right: 2px solid rgba(0, 255, 136, 0.4);
  padding: 4px 10px; text-align: right; min-width: 170px;
}
.matrix span { font-variant-numeric: tabular-nums; }
.note { font-size: 12px; line-height: 1.6; color: rgba(207, 231, 216, 0.8); }
.note b { color: #7dffb2; }
.note .recovered { color: #f5b14a; }

.params { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 0.8rem; }
.param label {
  display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; color: rgba(207, 231, 216, 0.7); margin-bottom: 0.3rem;
}
.param label .val { color: #7dffb2; }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 2px; background: rgba(207, 231, 216, 0.25);
  border-radius: 2px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #0b0f0e; border: 1.5px solid #7dffb2; box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
}
input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: #0b0f0e; border: 1.5px solid #7dffb2; box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
}
</style>
</head>
<body>
<div class="wrap">
  <canvas id="scene" width="624" height="248"></canvas>
  <div class="hint">drag in the left view - the epipolar line in the right view comes from the <b>estimated</b> matrix</div>

  <div class="panel">
    <div class="matrix" id="matrix"></div>
    <div class="note" id="note"></div>
  </div>

  <div class="params">
    <div class="param">
      <label for="tx">Sideways translation <span class="val" id="tx-val">0.70</span></label>
      <input type="range" id="tx" min="-1.5" max="1.5" step="0.05" value="0.7">
    </div>
    <div class="param">
      <label for="tz">Forward translation <span class="val" id="tz-val">2.00</span></label>
      <input type="range" id="tz" min="0.3" max="3" step="0.05" value="2.0">
    </div>
    <div class="param">
      <label for="yaw">Rotation (yaw) <span class="val" id="yaw-val">6°</span></label>
      <input type="range" id="yaw" min="-20" max="20" step="1" value="6">
    </div>
    <div class="param">
      <label for="noise">Measurement noise <span class="val" id="noise-val">0.0 px</span></label>
      <input type="range" id="noise" min="0" max="2.5" step="0.1" value="0">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

const W = 300, H = 248, GAP = 24, RIGHT = W + GAP;
const f = 260, cx = W / 2, cy = H / 2;
const K    = [f, 0, cx, 0, f, cy, 0, 0, 1];
const Kinv = [1/f, 0, -cx/f, 0, 1/f, -cy/f, 0, 0, 1];

// fixed 3D scene (camera-1 coords): need >=8 non-coplanar points for the 8-point solve
const SCENE = [
  [-1.2, -0.6, 5.0], [0.8, -0.4, 6.5], [1.5, 0.7, 5.5], [-0.9, 0.9, 7.0],
  [0.2, 0.1, 4.5], [-1.7, 0.2, 8.0], [1.1, -0.9, 7.5], [0.5, 0.8, 5.0],
  [-0.3, -0.9, 6.0], [1.7, 0.1, 6.8],
];

let query = { x: 90, y: 90 };
let model = null;   // { matches, F, E, recovered } recomputed when sliders change

/* ===== tiny linear algebra (row-major) ===== */
const mul = (A, B) => {        // 3x3 * 3x3
  const C = new Array(9).fill(0);
  for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) for (let k = 0; k < 3; k++)
    C[i*3+j] += A[i*3+k] * B[k*3+j];
  return C;
};
const mv = (A, v) => [
  A[0]*v[0]+A[1]*v[1]+A[2]*v[2],
  A[3]*v[0]+A[4]*v[1]+A[5]*v[2],
  A[6]*v[0]+A[7]*v[1]+A[8]*v[2],
];
const T = A => [A[0],A[3],A[6], A[1],A[4],A[7], A[2],A[5],A[8]];
const rotY = a => [Math.cos(a),0,Math.sin(a), 0,1,0, -Math.sin(a),0,Math.cos(a)];
const skew = t => [0,-t[2],t[1], t[2],0,-t[0], -t[1],t[0],0];
const cross = (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const norm3 = v => { const n = Math.hypot(v[0],v[1],v[2])||1; return [v[0]/n,v[1]/n,v[2]/n]; };
const det3 = M => M[0]*(M[4]*M[8]-M[5]*M[7]) - M[1]*(M[3]*M[8]-M[5]*M[6]) + M[2]*(M[3]*M[7]-M[4]*M[6]);
function colsToMat(c1,c2,c3){ // build 3x3 with given columns
  return [c1[0],c2[0],c3[0], c1[1],c2[1],c3[1], c1[2],c2[2],c3[2]];
}

// Jacobi eigen-decomposition of a symmetric n x n matrix (row-major).
// returns { val:[n], vec:[n*n] } with eigenvectors as COLUMNS of vec.
function eigSym(Sin, n) {
  const a = Sin.slice();
  const v = new Array(n*n).fill(0);
  for (let i = 0; i < n; i++) v[i*n+i] = 1;
  for (let sweep = 0; sweep < 100; sweep++) {
    let off = 0;
    for (let p = 0; p < n; p++) for (let q = p+1; q < n; q++) off += a[p*n+q]*a[p*n+q];
    if (off < 1e-22) break;
    for (let p = 0; p < n; p++) {
      for (let q = p+1; q < n; q++) {
        const apq = a[p*n+q];
        if (Math.abs(apq) < 1e-20) continue;
        const theta = (a[q*n+q] - a[p*n+p]) / (2*apq);
        const t = (theta >= 0 ? 1 : -1) / (Math.abs(theta) + Math.sqrt(theta*theta + 1));
        const c = 1 / Math.sqrt(t*t + 1), s = t*c;
        for (let k = 0; k < n; k++) {
          const g = a[k*n+p], h = a[k*n+q];
          a[k*n+p] = c*g - s*h; a[k*n+q] = s*g + c*h;
        }
        for (let k = 0; k < n; k++) {
          const g = a[p*n+k], h = a[q*n+k];
          a[p*n+k] = c*g - s*h; a[q*n+k] = s*g + c*h;
        }
        for (let k = 0; k < n; k++) {
          const g = v[k*n+p], h = v[k*n+q];
          v[k*n+p] = c*g - s*h; v[k*n+q] = s*g + c*h;
        }
      }
    }
  }
  const val = []; for (let i = 0; i < n; i++) val.push(a[i*n+i]);
  return { val, vec: v };
}
const colOf = (vec, n, idx) => { const c = []; for (let i = 0; i < n; i++) c.push(vec[i*n+idx]); return c; };
function eigSorted(S, n) {                  // descending eigenvalues
  const e = eigSym(S, n);
  const order = e.val.map((v,i)=>i).sort((i,j)=>e.val[j]-e.val[i]);
  return order.map(i => ({ val: e.val[i], vec: colOf(e.vec, n, i) }));
}
function smallestVec(S, n) {                 // eigenvector of smallest eigenvalue
  return eigSorted(S, n)[n-1].vec;
}
function ATA(rows, ncols) {                  // A^T A from list of row-arrays
  const S = new Array(ncols*ncols).fill(0);
  for (const r of rows)
    for (let i = 0; i < ncols; i++) for (let j = 0; j < ncols; j++) S[i*ncols+j] += r[i]*r[j];
  return S;
}

/* ===== normalized 8-point fundamental-matrix estimation ===== */
function normalizeTransform(pts) {
  let mx = 0, my = 0;
  for (const p of pts) { mx += p.x; my += p.y; }
  mx /= pts.length; my /= pts.length;
  let d = 0;
  for (const p of pts) d += Math.hypot(p.x-mx, p.y-my);
  d /= pts.length;
  const s = (d > 1e-9 ? Math.SQRT2 / d : 1);
  return [s,0,-s*mx, 0,s,-s*my, 0,0,1];
}
function estimateF(matches) {
  const T1 = normalizeTransform(matches.map(m => m.a));
  const T2 = normalizeTransform(matches.map(m => m.b));
  const rows = matches.map(m => {
    const p1 = mv(T1, [m.a.x, m.a.y, 1]);
    const p2 = mv(T2, [m.b.x, m.b.y, 1]);
    const u1=p1[0],v1=p1[1], u2=p2[0],v2=p2[1];
    return [u2*u1, u2*v1, u2, v2*u1, v2*v1, v2, u1, v1, 1];
  });
  const fvec = smallestVec(ATA(rows, 9), 9);
  let Fh = fvec.slice(0,9);
  // enforce rank 2: F = s1 u1 v1^T + s2 u2 v2^T  (drop smallest singular value)
  const es = eigSorted(mul(T(Fh), Fh), 3);
  const s1 = Math.sqrt(Math.max(es[0].val, 0)), s2 = Math.sqrt(Math.max(es[1].val, 0));
  const v1 = es[0].vec, v2 = es[1].vec;
  const u1 = norm3(mv(Fh, v1)), u2 = norm3(mv(Fh, v2));
  const F2 = new Array(9);
  for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++)
    F2[i*3+j] = s1*u1[i]*v1[j] + s2*u2[i]*v2[j];
  // denormalize: F = T2^T F2 T1
  return mul(T(T2), mul(F2, T1));
}

/* ===== decompose essential matrix into R, t (chosen by cheirality) ===== */
function decomposeE(E, matches) {
  const es = eigSorted(mul(T(E), E), 3);     // V from E^T E
  const v1 = es[0].vec, v2 = es[1].vec, v3 = es[2].vec;
  const s1 = Math.sqrt(Math.max(es[0].val,0)), s2 = Math.sqrt(Math.max(es[1].val,0));
  if (s1 < 1e-9 || s2 < 1e-9) return null;
  let u1 = norm3(mv(E, v1)), u2 = norm3(mv(E, v2)), u3 = norm3(cross(u1, u2));
  let U = colsToMat(u1, u2, u3);
  let V = colsToMat(v1, v2, v3);
  if (det3(U) < 0) { U = colsToMat(u1, u2, [-u3[0],-u3[1],-u3[2]]); }
  if (det3(V) < 0) { V = colsToMat(v1, v2, [-v3[0],-v3[1],-v3[2]]); }
  const Wm = [0,-1,0, 1,0,0, 0,0,1];
  const Vt = T(V);
  const R1 = mul(mul(U, Wm), Vt);
  const R2 = mul(mul(U, T(Wm)), Vt);
  const t  = [U[2], U[5], U[8]];             // third column of U
  const cands = [
    {R:R1, t:t}, {R:R1, t:t.map(x=>-x)},
    {R:R2, t:t}, {R:R2, t:t.map(x=>-x)},
  ];
  let best = null, bestN = -1;
  for (const c of cands) {
    let good = 0;
    for (const m of matches) {
      const n1 = mv(Kinv, [m.a.x, m.a.y, 1]);   // normalized image coords
      const n2 = mv(Kinv, [m.b.x, m.b.y, 1]);
      const X = triangulate(n1, n2, c.R, c.t);
      if (!X) continue;
      const d1 = X[2];
      const Xc2 = [
        c.R[0]*X[0]+c.R[1]*X[1]+c.R[2]*X[2]+c.t[0],
        c.R[3]*X[0]+c.R[4]*X[1]+c.R[5]*X[2]+c.t[1],
        c.R[6]*X[0]+c.R[7]*X[1]+c.R[8]*X[2]+c.t[2],
      ];
      if (d1 > 0 && Xc2[2] > 0) good++;
    }
    if (good > bestN) { bestN = good; best = c; }
  }
  if (!best) return null;
  const R = best.R;
  const yaw = Math.atan2(R[2], R[0]) * 180 / Math.PI;  // rotation about Y
  return { R, t: norm3(best.t), yaw };
}
// linear (DLT) triangulation in normalized coords: P1=[I|0], P2=[R|t]
function triangulate(n1, n2, R, t) {
  const x1 = n1[0]/n1[2], y1 = n1[1]/n1[2];
  const x2 = n2[0]/n2[2], y2 = n2[1]/n2[2];
  const P2 = [R[0],R[1],R[2],t[0], R[3],R[4],R[5],t[1], R[6],R[7],R[8],t[2]];
  // DLT rows: with P1 = [I|0],  x1*P1_row3 - P1_row1  and  y1*P1_row3 - P1_row2
  const r = [
    [ -1,  0, x1, 0 ],
    [  0, -1, y1, 0 ],
    [ x2*P2[8]-P2[0], x2*P2[9]-P2[1], x2*P2[10]-P2[2], x2*P2[11]-P2[3] ],
    [ y2*P2[8]-P2[4], y2*P2[9]-P2[5], y2*P2[10]-P2[6], y2*P2[11]-P2[7] ],
  ];
  const Xh = smallestVec(ATA(r, 4), 4);
  if (Math.abs(Xh[3]) < 1e-12) return null;
  return [Xh[0]/Xh[3], Xh[1]/Xh[3], Xh[2]/Xh[3]];
}

/* ===== build the synthetic correspondences + estimate everything ===== */
function gaussish() { return (Math.random()+Math.random()+Math.random()-1.5) * 0.9; }
function recomputeModel() {
  const tx  = parseFloat(document.getElementById('tx').value);
  const tz  = parseFloat(document.getElementById('tz').value);
  const yaw = parseFloat(document.getElementById('yaw').value) * Math.PI/180;
  const nz  = parseFloat(document.getElementById('noise').value);
  const R = rotY(yaw), t = [tx, 0, tz];

  const matches = SCENE.map(X => {
    const p1 = mv(K, X);
    const Xc2 = [R[0]*X[0]+R[1]*X[1]+R[2]*X[2]+t[0], R[3]*X[0]+R[4]*X[1]+R[5]*X[2]+t[1], R[6]*X[0]+R[7]*X[1]+R[8]*X[2]+t[2]];
    const p2 = mv(K, Xc2);
    return {
      a: { x: p1[0]/p1[2] + gaussish()*nz, y: p1[1]/p1[2] + gaussish()*nz },
      b: { x: p2[0]/p2[2] + gaussish()*nz, y: p2[1]/p2[2] + gaussish()*nz },
    };
  });

  const F = estimateF(matches);
  const E = mul(T(K), mul(F, K));            // E = K^T F K
  let recovered = null;
  try { recovered = decomposeE(E, matches); } catch (_) {}
  model = { matches, F, E, recovered, trueYaw: yaw*180/Math.PI };
}

/* ===== rendering ===== */
function clipLine(a, b, c) {
  const pts = [];
  const add = (x, y) => { if (x >= -0.5 && x <= W+0.5 && y >= -0.5 && y <= H+0.5) pts.push([x, y]); };
  if (Math.abs(b) > 1e-9) { add(0, -c/b); add(W, -(c + a*W)/b); }
  if (Math.abs(a) > 1e-9) { add(-c/a, 0); add(-(c + b*H)/a, H); }
  return pts.length >= 2 ? [pts[0], pts[1]] : null;
}
function dot(x, y, r, color) { ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); }
function crosshair(x, y) {
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
  ctx.strokeStyle = '#7dffb2'; ctx.beginPath(); ctx.arc(x,y,4,0,7); ctx.stroke();
}

function render() {
  const { matches, F } = model;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const ox of [0, RIGHT]) {
    ctx.fillStyle = 'rgba(125,255,178,0.025)'; ctx.fillRect(ox, 0, W, H);
    ctx.strokeStyle = 'rgba(0,255,136,0.3)'; ctx.lineWidth = 1; ctx.strokeRect(ox+0.5, 0.5, W-1, H-1);
  }
  ctx.fillStyle = 'rgba(207,231,216,0.55)'; ctx.font = '11px IBM Plex Mono, monospace';
  ctx.fillText('VIEW 1  (camera A)', 8, 16);
  ctx.fillText('VIEW 2  (camera B)', RIGHT + 8, 16);

  // faint epipolar pencil for every matched point (from the ESTIMATED F)
  for (const m of matches) {
    const l = mv(F, [m.a.x, m.a.y, 1]);
    const seg = clipLine(l[0], l[1], l[2]);
    if (seg) {
      ctx.strokeStyle = 'rgba(125,255,178,0.18)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(RIGHT+seg[0][0], seg[0][1]); ctx.lineTo(RIGHT+seg[1][0], seg[1][1]); ctx.stroke();
    }
  }

  // epipole e' in view 2 = null space of F^T
  const ev = smallestVec(mul(F, T(F)), 3);
  if (Math.abs(ev[2]) > 1e-9) {
    const ex = ev[0]/ev[2], ey = ev[1]/ev[2];
    if (ex > -40 && ex < W+40 && ey > -40 && ey < H+40) {
      dot(RIGHT+ex, ey, 3.5, '#f5b14a');
      ctx.fillStyle = 'rgba(245,177,74,0.85)'; ctx.fillText("e′ (epipole)", RIGHT+ex+7, ey-5);
    }
  }

  matches.forEach(m => {
    dot(m.a.x, m.a.y, 3, 'rgba(125,255,178,0.85)');
    dot(RIGHT + m.b.x, m.b.y, 3, 'rgba(125,255,178,0.85)');
  });

  // highlight the match nearest the query
  let nearest = null, nd = 1e9;
  matches.forEach(m => { const d = Math.hypot(m.a.x-query.x, m.a.y-query.y); if (d < nd) { nd = d; nearest = m; } });
  if (nearest && nd < 22) {
    dot(nearest.a.x, nearest.a.y, 5, '#7dffb2');
    dot(RIGHT + nearest.b.x, nearest.b.y, 5, '#7dffb2');
  }

  // bold epipolar line for the dragged query point
  const lq = mv(F, [query.x, query.y, 1]);
  const segq = clipLine(lq[0], lq[1], lq[2]);
  if (segq) {
    ctx.strokeStyle = '#7dffb2'; ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(0,255,136,0.5)'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.moveTo(RIGHT+segq[0][0], segq[0][1]); ctx.lineTo(RIGHT+segq[1][0], segq[1][1]); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  crosshair(query.x, query.y);

  updatePanel();
}

function fmtMat(M) {
  let m = 0; for (const v of M) m = Math.max(m, Math.abs(v));
  if (m < 1e-9) m = 1;
  return M.map(v => `<span>${(v/m >= 0 ? ' ' : '') + (v/m).toFixed(2)}</span>`).join('');
}
function updatePanel() {
  const matrix = document.getElementById('matrix');
  const note = document.getElementById('note');
  matrix.innerHTML = fmtMat(model.E);
  const r = model.recovered;
  const rec = r
    ? `<span class="recovered">yaw ${r.yaw.toFixed(1)}°, t dir [${r.t.map(x=>x.toFixed(2)).join(', ')}]</span>`
    : `<span class="recovered">(degenerate - adjust the scene)</span>`;
  note.innerHTML =
    `<b>Essential matrix E</b>, <b>estimated</b> from the ${model.matches.length} point ` +
    `matches (normalized 8-point algorithm) and decomposed (SVD + cheirality) into the camera motion: ` +
    `${rec}. True yaw was ${model.trueYaw.toFixed(1)}°.`;
}

/* ===== interaction ===== */
let dragging = false;
function toImage(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  return {
    x: ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) * sx,
    y: ((e.touches ? e.touches[0].clientY : e.clientY) - r.top) * sy,
  };
}
function setQuery(e) {
  const p = toImage(e);
  if (p.x <= W + 4) {
    query.x = Math.max(2, Math.min(W-2, p.x));
    query.y = Math.max(2, Math.min(H-2, p.y));
    render();
  }
}
canvas.addEventListener('mousedown', e => { dragging = true; setQuery(e); });
canvas.addEventListener('mousemove', e => { if (dragging) setQuery(e); });
window.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('touchstart', e => { dragging = true; setQuery(e); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', e => { if (dragging) { setQuery(e); e.preventDefault(); } }, { passive: false });
window.addEventListener('touchend', () => dragging = false);

['tx','tz','yaw','noise'].forEach(id => {
  const el = document.getElementById(id), valEl = document.getElementById(id+'-val');
  el.addEventListener('input', () => {
    valEl.textContent = id === 'yaw' ? el.value + '°'
                      : id === 'noise' ? parseFloat(el.value).toFixed(1) + ' px'
                      : parseFloat(el.value).toFixed(2);
    recomputeModel();
    render();
  });
});

recomputeModel();
render();
</script>
</body>
</html>
