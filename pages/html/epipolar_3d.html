<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Mono', ui-monospace, monospace; background: transparent; color: #cfe7d8; letter-spacing: 0.04em; }
.wrap { max-width: 720px; margin: 0 auto; padding: 1rem; }
canvas#stage {
  display: block; width: 100%; height: auto;
  border: 1px solid rgba(0, 255, 136, 0.35); border-radius: 8px;
  background: #0b0f0e; cursor: grab; box-shadow: 0 0 18px rgba(0, 255, 136, 0.08);
}
canvas#stage:active { cursor: grabbing; }
.hint { text-align: center; font-size: 11px; color: rgba(207,231,216,0.5); margin-top: 0.5rem; letter-spacing: 0.06em; }
.params { margin-top: 0.9rem; display: flex; flex-direction: column; gap: 0.8rem; }
.param label { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(207,231,216,0.7); margin-bottom: 0.3rem; }
.param label .val { color: #7dffb2; }
input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 2px; background: rgba(207,231,216,0.25); border-radius: 2px; outline: none; cursor: pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #0b0f0e; border: 1.5px solid #7dffb2; box-shadow: 0 0 8px rgba(0,255,136,0.4); }
input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #0b0f0e; border: 1.5px solid #7dffb2; box-shadow: 0 0 8px rgba(0,255,136,0.4); }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="stage" width="720" height="540"></canvas>
  <div class="hint">drag to orbit · we want the motion from A to B: the translation <b>t</b> (white arrow) and the rotation <b>R</b> (white arc)</div>

  <div class="params">
    <div class="param">
      <label for="tx">Camera B - sideways <span class="val" id="tx-val">0.80</span></label>
      <input type="range" id="tx" min="-1.5" max="1.5" step="0.05" value="0.8">
    </div>
    <div class="param">
      <label for="tz">Camera B - forward <span class="val" id="tz-val">1.50</span></label>
      <input type="range" id="tz" min="0.05" max="3" step="0.05" value="1.5">
    </div>
    <div class="param">
      <label for="rot">Camera B - rotation <span class="val" id="rot-val">0°</span></label>
      <input type="range" id="rot" min="-40" max="40" step="1" value="0">
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

// ---- vector / matrix helpers ----
const add = (a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const sub = (a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const scl = (a,s)=>[a[0]*s,a[1]*s,a[2]*s];
const mv  = (M,v)=>[M[0]*v[0]+M[1]*v[1]+M[2]*v[2], M[3]*v[0]+M[4]*v[1]+M[5]*v[2], M[6]*v[0]+M[7]*v[1]+M[8]*v[2]];
const T   = M=>[M[0],M[3],M[6],M[1],M[4],M[7],M[2],M[5],M[8]];
const vdot= (a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const rotY= a=>[Math.cos(a),0,Math.sin(a),0,1,0,-Math.sin(a),0,Math.cos(a)];

// ---- fixed scene (world = camera-A frame): a handful of 3D points ----
const SCENE = [
  [-1.3,-0.8,4.2],[1.1,-0.5,5.0],[0.2,0.9,4.6],[-0.6,0.4,6.0],[1.4,0.7,3.8],
];
const HILITE = 2;   // which point gets the epipolar rays/plane drawn

// ---- orbit view (orthographic) ----
let az = 0.7, el = 0.32;
const TARGET = [0, 0, 3.4], SCALE = 84, CX = 360, CY = 260;
function project(p) {
  const x = p[0]-TARGET[0], y = p[1]-TARGET[1], z = p[2]-TARGET[2];
  const x1 =  x*Math.cos(az) + z*Math.sin(az);
  const z1 = -x*Math.sin(az) + z*Math.cos(az);
  const y2 =  y*Math.cos(el) - z1*Math.sin(el);
  return { x: CX + x1*SCALE, y: CY - y2*SCALE };
}
function line3(p, q, style, width, dash) {
  const a = project(p), b = project(q);
  ctx.strokeStyle = style; ctx.lineWidth = width || 1;
  ctx.setLineDash(dash || []);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.setLineDash([]);
}
function dot3(p, r, color) { const a = project(p); ctx.fillStyle = color; ctx.beginPath(); ctx.arc(a.x, a.y, r, 0, 7); ctx.fill(); }
function cross3(p, s, color) {
  const a = project(p);
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(a.x - s, a.y - s); ctx.lineTo(a.x + s, a.y + s);
  ctx.moveTo(a.x + s, a.y - s); ctx.lineTo(a.x - s, a.y + s);
  ctx.stroke();
}
function label3(p, txt, color, dx, dy) { const a = project(p); ctx.fillStyle = color; ctx.font = '11px IBM Plex Mono, monospace'; ctx.fillText(txt, a.x + (dx||6), a.y + (dy||-6)); }
// solid 3D arrow (segment + screen-space arrowhead at the 'to' end)
function arrow3(from, to, color, width) {
  line3(from, to, color, width);
  const a = project(from), b = project(to), ang = Math.atan2(b.y-a.y, b.x-a.x), s = 9;
  ctx.strokeStyle = color; ctx.lineWidth = width || 2; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - s*Math.cos(ang-0.4), b.y - s*Math.sin(ang-0.4));
  ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - s*Math.cos(ang+0.4), b.y - s*Math.sin(ang+0.4));
  ctx.stroke();
}

// draw a camera as a small frustum (apex + image-plane rectangle)
const F = 0.7, HS = 0.55;   // frustum depth and half-size of the image plane
function camera(apex, Rw, color, fillCol, name) {
  const d = mv(Rw, [0,0,1]), r = mv(Rw, [1,0,0]), u = mv(Rw, [0,1,0]);
  const c = add(apex, scl(d, F));
  const c1 = add(add(c, scl(r,  HS)), scl(u,  HS));
  const c2 = add(add(c, scl(r, -HS)), scl(u,  HS));
  const c3 = add(add(c, scl(r, -HS)), scl(u, -HS));
  const c4 = add(add(c, scl(r,  HS)), scl(u, -HS));
  // image plane: faint fill + outline
  const q = [c1,c2,c3,c4].map(project);
  ctx.fillStyle = fillCol;
  ctx.beginPath(); ctx.moveTo(q[0].x,q[0].y);
  for (let i=1;i<4;i++) ctx.lineTo(q[i].x,q[i].y);
  ctx.closePath(); ctx.fill();
  line3(c1,c2,color,1.5); line3(c2,c3,color,1.5); line3(c3,c4,color,1.5); line3(c4,c1,color,1.5);
  // sides to apex
  [c1,c2,c3,c4].forEach(cc=>line3(apex,cc,'rgba(207,231,216,0.30)',1));
  dot3(apex, 5, color);
  label3(apex, name, color, 6, -8);
  return { apex, d, center: c };  // center = image-plane centre
}

function render() {
  const tx = +document.getElementById('tx').value;
  const tz = +document.getElementById('tz').value;
  const rot = (+document.getElementById('rot').value) * Math.PI/180;
  const R = rotY(rot);                 // camera B's rotation relative to A
  const Oa = [0,0,0];
  const Cb = [tx, 0, tz];              // camera-B optical centre in world (sideways, forward)

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // epipolar plane (triangle A-B-P) for the highlighted point
  const P = SCENE[HILITE];
  const pa = project(Oa), pb = project(Cb), pp = project(P);
  ctx.fillStyle = 'rgba(245,177,74,0.10)';
  ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.lineTo(pp.x,pp.y); ctx.closePath(); ctx.fill();

  // scene points (rays drawn only for the one highlighted point, to stay clean)
  SCENE.forEach((p,i)=> dot3(p, 3.4, i===HILITE ? '#8fd3ff' : 'rgba(143,211,255,0.5)'));
  line3(Oa, P, 'rgba(125,255,178,0.6)', 1.2, [4,4]);
  line3(Cb, P, 'rgba(245,177,74,0.6)', 1.2, [4,4]);

  // the two cameras
  const camA = camera(Oa, [1,0,0,0,1,0,0,0,1], '#7dffb2', 'rgba(125,255,178,0.16)', 'A  (Ft-1)');
  const camB = camera(Cb, R, '#f5b14a', 'rgba(245,177,74,0.16)', 'B  (Ft)');

  // where the ray to the feature point crosses each image plane = the projected pixel
  function projectFeature(apex, d, col) {
    const s = F / vdot(sub(P, apex), d);
    if (s <= 0) return;
    cross3(add(apex, scl(sub(P, apex), s)), 5, col);
  }
  projectFeature(Oa, camA.d, '#eafff3');
  projectFeature(Cb, camB.d, '#ffe9c9');

  // --- what we're solving for: the motion from A to B ---
  // translation t: the vector from A's centre to B's centre (stop short of B so
  // the arrowhead clears the camera label)
  arrow3(Oa, scl(Cb, 0.92), '#eafff3', 2.5);
  label3(scl(Cb, 0.45), 't', '#eafff3', 8, -6);

  // rotation R: B's viewing direction vs a faint copy of A's orientation placed
  // at B; the amber arc between them is the rotation we recover
  const dRef = camA.d, dCur = camB.d, AL = F * 1.05;
  arrow3(Cb, add(Cb, scl(dRef, AL)), 'rgba(234,255,243,0.6)', 1.6);
  const o = project(Cb);
  const p1 = project(add(Cb, scl(dRef, AL))), p2 = project(add(Cb, scl(dCur, AL)));
  const a1 = Math.atan2(p1.y-o.y, p1.x-o.x), a2 = Math.atan2(p2.y-o.y, p2.x-o.x);
  const rad = 0.5*(Math.hypot(p1.x-o.x,p1.y-o.y)+Math.hypot(p2.x-o.x,p2.y-o.y));
  if (Math.abs(rot) > 0.01) {
    ctx.strokeStyle = '#eafff3'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(o.x, o.y, rad, Math.min(a1,a2), Math.max(a1,a2)); ctx.stroke();
  }
  const aMid = (a1+a2)/2;
  ctx.fillStyle = '#eafff3'; ctx.font = '12px IBM Plex Mono, monospace';
  ctx.fillText('R', o.x + (rad+12)*Math.cos(aMid) - 4, o.y + (rad+12)*Math.sin(aMid) + 4);
}

// orbit interaction
let drag = false, lastX = 0, lastY = 0;
function pt(e){ return { x: e.touches?e.touches[0].clientX:e.clientX, y: e.touches?e.touches[0].clientY:e.clientY }; }
canvas.addEventListener('mousedown', e => { drag = true; const p = pt(e); lastX = p.x; lastY = p.y; });
canvas.addEventListener('mousemove', e => {
  if (!drag) return;
  const p = pt(e);
  az += (p.x - lastX) * 0.01;
  el = Math.max(-1.2, Math.min(1.2, el + (p.y - lastY) * 0.01));
  lastX = p.x; lastY = p.y; render();
});
window.addEventListener('mouseup', () => drag = false);
canvas.addEventListener('touchstart', e => { drag = true; const p = pt(e); lastX = p.x; lastY = p.y; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', e => { if (!drag) return; const p = pt(e); az += (p.x-lastX)*0.01; el = Math.max(-1.2,Math.min(1.2, el+(p.y-lastY)*0.01)); lastX=p.x; lastY=p.y; e.preventDefault(); render(); }, { passive: false });
window.addEventListener('touchend', () => drag = false);

['tx','tz','rot'].forEach(id => {
  const el2 = document.getElementById(id), v = document.getElementById(id+'-val');
  el2.addEventListener('input', () => {
    v.textContent = id==='rot' ? `${el2.value}°` : (+el2.value).toFixed(2);
    render();
  });
});

render();
</script>
</body>
</html>
