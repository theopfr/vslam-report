<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  background: transparent;
  color: #cfe7d8;
  letter-spacing: 0.04em;
}

.wrap {
  max-width: 650px;
  height: 775px;
  margin: 0 auto;
  padding: 1rem;
}

/* ===== STAGE ===== */
.stage {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border: 1px solid rgb(0, 255, 136);
  border-radius: 8px;
  overflow: hidden;
  background:
    repeating-linear-gradient(
      45deg,
      rgba(125, 255, 178, 0.04) 0px,
      rgba(125, 255, 178, 0.04) 10px,
      transparent 10px,
      transparent 20px
    ),
    #0b0f0e;
  box-shadow: 0 0 18px rgba(0, 255, 136, 0.08);
}

video { display: none; }

canvas#out {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

/* placeholder / idle message centered on the stage */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.9rem;
  text-align: center;
  padding: 1.5rem;
  z-index: 2;
}

.overlay.hidden { display: none; }

.overlay p {
  font-size: 11px;
  color: rgba(207, 231, 216, 0.6);
  line-height: 1.5;
  max-width: 280px;
}

/* ===== HUD (count badge) ===== */
.hud {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 3;
  font-size: 12px;
  color: #7dffb2;
  background: rgba(11, 15, 14, 0.65);
  border: 1px solid rgba(0, 255, 136, 0.3);
  border-radius: 5px;
  padding: 4px 9px;
  letter-spacing: 0.08em;
  text-shadow: 0 0 8px rgba(0, 255, 136, 0.25);
  display: none;
}

.hud.show { display: block; }

/* ===== BUTTON ===== */
.btn {
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #0b0f0e;
  background: #7dffb2;
  border: none;
  border-radius: 6px;
  padding: 0.7rem 1.4rem;
  cursor: pointer;
  font-weight: 600;
  transition: box-shadow 0.2s ease, transform 0.08s ease, background 0.2s ease;
  box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
}

.btn:hover:not(:disabled) {
  box-shadow: 0 0 18px rgba(0, 255, 136, 0.55);
}

.btn:active:not(:disabled) { transform: scale(0.97); }

.btn:disabled {
  background: rgba(125, 255, 178, 0.25);
  color: rgba(11, 15, 14, 0.6);
  cursor: not-allowed;
  box-shadow: none;
}

/* secondary "ghost" toggle */
.btn.ghost {
  background: transparent;
  color: #7dffb2;
  border: 1px solid rgba(0, 255, 136, 0.4);
  box-shadow: none;
  text-transform: none;
  letter-spacing: 0.06em;
}
.btn.ghost:hover:not(:disabled) { box-shadow: 0 0 12px rgba(0, 255, 136, 0.25); }
.btn.ghost.active {
  background: rgba(125, 255, 178, 0.15);
  box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
}

.controls {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  align-items: center;
  margin-top: 0.9rem;
  flex-wrap: wrap;
}

.status {
  font-size: 12px;
  color: rgba(207, 231, 216, 0.55);
}

.status.err { color: #ff8a8a; }

/* ===== PARAMETER SLIDERS ===== */
.params {
  margin-top: 1.1rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.param label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(207, 231, 216, 0.7);
  margin-bottom: 0.35rem;
}

.param label .val {
  color: #7dffb2;
  text-shadow: 0 0 8px rgba(0, 255, 136, 0.25);
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: rgba(207, 231, 216, 0.25);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #0b0f0e;
  border: 1.5px solid #7dffb2;
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #0b0f0e;
  border: 1.5px solid #7dffb2;
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
}

#richBtn {
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <video id="video" playsinline muted></video>
    <canvas id="out"></canvas>

    <div class="hud" id="hud">ORB keypoints: 0</div>

    <div class="overlay" id="overlay">
      <p>Detect ORB keypoints live on your camera feed. Nothing leaves your browser.</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn" disabled>Loading OpenCV…</button>
    <button class="btn ghost" id="richBtn">Rich keypoints: off</button>
    <span class="status" id="status"></span>
  </div>

  <div class="params">
    <div class="param">
      <label for="nfeatures">Max features <span class="val" id="nfeatures-val">500</span></label>
      <input type="range" id="nfeatures" min="50" max="2000" step="50" value="500">
    </div>
    <div class="param">
      <label for="fastThreshold">FAST threshold <span class="val" id="fastThreshold-val">20</span></label>
      <input type="range" id="fastThreshold" min="1" max="60" step="1" value="20">
    </div>
    <div class="param">
      <label for="scaleFactor">Pyramid scale factor <span class="val" id="scaleFactor-val">1.20</span></label>
      <input type="range" id="scaleFactor" min="1.1" max="2.0" step="0.05" value="1.2">
    </div>
    <div class="param">
      <label for="nlevels">Pyramid levels <span class="val" id="nlevels-val">8</span></label>
      <input type="range" id="nlevels" min="1" max="12" step="1" value="8">
    </div>
  </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('out');
const ctx      = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const overlay  = document.getElementById('overlay');
const hud      = document.getElementById('hud');
const statusEl = document.getElementById('status');
const richBtn  = document.getElementById('richBtn');

let richView = false;
richBtn.addEventListener('click', () => {
  richView = !richView;
  richBtn.textContent = 'Rich keypoints: ' + (richView ? 'on' : 'off');
  richBtn.classList.toggle('active', richView);
});

const PROC_W = 640;   // processing width (height derived from camera aspect)
let cvReady = false;
let running = false;
let stream  = null;

// OpenCV reusable objects (allocated once camera starts)
let orb, src, gray, keypoints, mask, raf;

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg || '';
  statusEl.classList.toggle('err', !!isErr);
}

// ---- ORB tunable parameters (wired to the sliders) ----
const sliders = {
  nfeatures:     document.getElementById('nfeatures'),
  fastThreshold: document.getElementById('fastThreshold'),
  scaleFactor:   document.getElementById('scaleFactor'),
  nlevels:       document.getElementById('nlevels'),
};

function buildOrb() {
  const nfeatures     = parseInt(sliders.nfeatures.value, 10);
  const scaleFactor   = parseFloat(sliders.scaleFactor.value);
  const nlevels       = parseInt(sliders.nlevels.value, 10);
  const fastThreshold = parseInt(sliders.fastThreshold.value, 10);

  // ORB(nfeatures, scaleFactor, nlevels, edgeThreshold, firstLevel,
  //     WTA_K, scoreType, patchSize, fastThreshold)
  return new cv.ORB(
    nfeatures, scaleFactor, nlevels, 31, 0,
    2, cv.ORB_HARRIS_SCORE, 31, fastThreshold
  );
}

// live-update value labels + rebuild the detector while running
Object.entries(sliders).forEach(([key, el]) => {
  const valEl = document.getElementById(key + '-val');
  el.addEventListener('input', () => {
    valEl.textContent = key === 'scaleFactor'
      ? parseFloat(el.value).toFixed(2)
      : el.value;
    if (running && orb) {
      const old = orb;
      orb = buildOrb();
      try { old.delete(); } catch (_) {}
    }
  });
});

// ---- wait for the OpenCV runtime ----
function waitForCv() {
  if (window.cv && cv.Mat) {
    onCvReady();
  } else if (window.cv) {
    cv['onRuntimeInitialized'] = onCvReady;
  } else {
    setTimeout(waitForCv, 100);
  }
}
function onCvReady() {
  cvReady = true;
  startBtn.disabled = false;
  startBtn.textContent = 'Start camera';
}
waitForCv();

startBtn.addEventListener('click', () => {
  if (!running) start();
  else stop();
});

async function start() {
  if (!cvReady) return;
  setStatus('Requesting camera…');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
  } catch (err) {
    setStatus('Camera access denied or unavailable.', true);
    return;
  }

  video.srcObject = stream;
  await video.play();

  // fixed 4:3 processing/display canvas - matches the stage box, so the feed
  // is cover-cropped (not stretched) regardless of the camera's aspect ratio.
  canvas.width  = PROC_W;
  canvas.height = Math.round(PROC_W * 3 / 4);

  // allocate OpenCV objects
  orb       = buildOrb();                      // configured from the sliders
  src       = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
  gray      = new cv.Mat();
  keypoints = new cv.KeyPointVector();
  mask      = new cv.Mat();

  running = true;
  overlay.classList.add('hidden');
  hud.classList.add('show');
  startBtn.textContent = 'Stop camera';
  setStatus('');
  loop();
}

function loop() {
  if (!running) return;

  // mirror the feed so it reads like a selfie; keypoints stay aligned
  // because we detect on the already-mirrored canvas pixels.
  // cover-crop the video into the 4:3 canvas so it fills without stretching.
  const vw = video.videoWidth, vh = video.videoHeight;
  const scale = Math.max(canvas.width / vw, canvas.height / vh);
  const dw = vw * scale, dh = vh * scale;
  const dx = (canvas.width - dw) / 2, dy = (canvas.height - dh) / 2;
  ctx.save();
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, dx, dy, dw, dh);
  ctx.restore();

  try {
    src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    keypoints.delete();
    keypoints = new cv.KeyPointVector();
    orb.detect(gray, keypoints, mask);

    const n = keypoints.size();
    let shown = n;
    if (richView) {
      // ORB fires the same corner at several pyramid scales — collapse those
      // into one keypoint (keep the strongest within a small radius) so the
      // view shows one clean circle + orientation per feature, not a pile.
      const kps = [];
      for (let i = 0; i < n; i++) {
        const kp = keypoints.get(i);
        kps.push({ x: kp.pt.x, y: kp.pt.y, r: 11, a: kp.angle * Math.PI / 180, resp: kp.response });
      }
      kps.sort((p, q) => q.resp - p.resp);   // strongest first
      const MIN_D2 = 16 * 16, kept = [];
      for (const k of kps) {
        let clash = false;
        for (const q of kept) { const dx = k.x - q.x, dy = k.y - q.y; if (dx*dx + dy*dy < MIN_D2) { clash = true; break; } }
        if (!clash) kept.push(k);
      }
      shown = kept.length;

      ctx.strokeStyle = 'rgb(125, 255, 178)';
      ctx.lineWidth = 1.25;
      for (const k of kept) {
        ctx.beginPath();
        ctx.arc(k.x, k.y, k.r, 0, 2 * Math.PI);
        ctx.moveTo(k.x, k.y);
        ctx.lineTo(k.x + k.r * Math.cos(k.a), k.y + k.r * Math.sin(k.a));
        ctx.stroke();
      }
    } else {
      // plain: a small dot at each keypoint
      ctx.fillStyle = 'rgba(125, 255, 178, 0.55)';
      for (let i = 0; i < n; i++) {
        const kp = keypoints.get(i);
        ctx.beginPath();
        ctx.arc(kp.pt.x, kp.pt.y, 3, 0, 2 * Math.PI);
        ctx.fill();
      }
    }
    hud.textContent = 'ORB keypoints: ' + shown;
  } catch (e) {
    // transient frame error - keep going
  }

  raf = requestAnimationFrame(loop);
}

function stop() {
  running = false;
  if (raf) cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;

  // free OpenCV memory
  [orb, src, gray, keypoints, mask].forEach(o => { try { o && o.delete(); } catch (_) {} });
  orb = src = gray = keypoints = mask = undefined;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  overlay.classList.remove('hidden');
  hud.classList.remove('show');
  startBtn.textContent = 'Start camera';
}

window.addEventListener('pagehide', stop);
</script>
</body>
</html>
