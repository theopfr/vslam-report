
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ===== RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pad-y: 24px;        /* vertical padding of the .tl wrapper */
  --section-min-h: 160px; /* desktop row-layout minimum section height */
}

body {
  font-family: 'IBM Plex Mono', monospace;
  background-color: transparent;
  color: #cfe7d8;
  letter-spacing: 0.06em;
  position: relative;
}

/* ===== LAYOUT ===== */
.tl {
  display: flex;
  gap: 0;
  padding: var(--pad-y) 1.5rem;
  max-width: 750px;
  position: relative;
  z-index: 1;
}

/* ===== TRACK ===== */
.track-col {
  display: block;
  width: 32px;
  flex-shrink: 0;
  position: relative;
  margin-right: 1.5rem;
  /* height set by JS to match the rendered height of .steps-col */
}

.track-bg {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 0; /* set by JS */

  background: linear-gradient(
    to bottom,
    rgba(207, 231, 216, 0.35),
    rgba(125, 255, 178, 0.10)
  );
  box-shadow: 0 0 6px rgba(0, 255, 136, 0.08);
}

.track-fill {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 0;

  background: #7dffb2;
  box-shadow:
    0 0 10px rgba(0, 255, 136, 0.35),
    0 0 18px rgba(0, 255, 136, 0.15);
  transition: height 0.18s ease;
}

/* dotted connector from the last numbered step down to the bonus step */
.track-bonus {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;     /* set by JS */
  height: 0;  /* set by JS */
  width: 0;
  border-left: 2px dotted rgba(207, 231, 216, 0.3);
  transition: border-color 0.25s ease;
}
.track-bonus.active {
  border-left-color: #7dffb2;
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.18);
}

/* ===== NODES (one per section, always visible) ===== */
.node {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
  z-index: 5;

  /* inactive (unvisited) look */
  background: #0b0f0e;
  border: 1.5px solid rgba(125, 255, 178, 0.4);
  transition: top 0.18s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.node.active {
  background: #7dffb2;
  border-color: #7dffb2;
  box-shadow:
    0 0 8px rgba(0, 255, 136, 0.55),
    0 0 16px rgba(0, 255, 136, 0.25);
}

.node-label { display: none; }

/* ===== HANDLE (unused visually, kept for compatibility) ===== */
.handle { display: none; }

/* ===== SECTIONS ===== */
.steps-col {
  flex: 1;
  min-width: 0; /* allow text to wrap instead of overflowing the flex item */
}

/* each section: content drives the height; min-height keeps desktop spacing */
.step {
  min-height: var(--section-min-h);
  display: flex;
  gap: 1.25rem;
  align-items: center;
  padding: 14px 0;

  opacity: 0.3;                       /* unvisited: visible but dimmed */
  transition: opacity 0.25s ease;
}

.step.visible {
  opacity: 1;                         /* visited: full */
}

/* ===== IMAGE PANELS ===== */
.step-img {
  width: 170px;
  aspect-ratio: 130 / 98;             /* matches the inline SVG viewBox, no letterbox bars */
  flex-shrink: 0;
  border-radius: 6px;
  background: transparent;
  border: 1px solid rgb(0, 255, 136);
  overflow: hidden;
  filter: grayscale(1);               /* unvisited thumbnails are greyed out */
  transition: filter 0.25s ease;
}

.step.visible .step-img { filter: none; }

.step-img svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ===== TEXT ===== */
.step-text {
  flex: 1;
  min-width: 0;
}

.step-num {
  font-size: 11px;
  color: rgba(207, 231, 216, 0.6);
  font-weight: 500;
  margin-bottom: 5px;
  letter-spacing: 0.08em;
}

.step-num.bonus {
  color: #f5b14a;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 600;
}

.step-title {
  font-size: 15px;
  font-weight: 600;
  color: #7dffb2;
  margin-bottom: 6px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.12);
  overflow-wrap: break-word;
}

.step-desc {
  font-size: 13px;
  color: #cfe7d8;
  line-height: 1.7;
  letter-spacing: 0.04em;
  overflow-wrap: break-word;
}

/* ====================================================================
   RESPONSIVE: tablet / phone - stack image above text
   --------------------------------------------------------------------
   NOTE: these are NOT @media queries. The component sits inside an
   iframe whose own rendered width can be narrower than the actual
   browser window (e.g. pinned to an article's text-column width), so
   a CSS media query on the iframe's own viewport would trigger at the
   wrong moment - or always. Instead, JS reads the real browser
   viewport width (window.parent.innerWidth, since this is a
   same-origin embed) and toggles the classes below. See
   applyBreakpoint() in the script.
   ==================================================================== */
.tl.bp-tablet {
  padding: var(--pad-y) 1.1rem;
}

.tl.bp-tablet .track-col {
  width: 26px;
  margin-right: 1rem;
}

.tl.bp-tablet .step {
  flex-direction: column;
  align-items: flex-start;
  gap: 0.9rem;
  min-height: 0;          /* let content height decide */
  padding: 18px 0;
}

.tl.bp-tablet .step-img {
  width: 150px;
}

.tl.bp-tablet .step-title {
  font-size: 14px;
}

.tl.bp-tablet .step-desc {
  font-size: 12.5px;
}

.tl.bp-phone {
  padding: var(--pad-y) 0.85rem;
}

.tl.bp-phone .track-col {
  width: 20px;
  margin-right: 0.75rem;
}

.tl.bp-phone .step {
  gap: 0.75rem;
  padding: 16px 0;
}

.tl.bp-phone .step-img {
  width: 120px;
}

.tl.bp-phone .step-num {
  font-size: 10px;
}

.tl.bp-phone .step-title {
  font-size: 13px;
  letter-spacing: 0.10em;
}

.tl.bp-phone .step-desc {
  font-size: 12px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="tl">
  <!-- vertical track -->
  <div class="track-col" id="track-col">
    <div class="track-bg" id="track-bg"></div>
    <div class="track-fill" id="track-fill"></div>
    <div class="track-bonus" id="track-bonus"></div>
    <!-- nodes injected by JS -->
    <div class="handle" id="handle"></div>
  </div>

  <!-- sections -->
  <div class="steps-col" id="steps-col"></div>

<script>

`<svg viewBox="0 0 130 98" xmlns="http://www.w3.org/2000/svg">

  <path d="M46,74 C22,68 22,36 48,28 C80,18 108,34 100,56 C95,72 78,84 64,79" fill="none" stroke="#60a5fa" stroke-width="1.6"/>

const steps = [
  { label: "ORB features",     title: "ORB feature detection",   desc: "From the camera's stream of frames, distinctive keypoints (corners, blobs) are detected and each is encoded as a compact binary descriptor." },
  { label: "Feature matching", title: "Feature matching",         desc: "Descriptors from consecutive frames are compared by Hamming distance. Matched pairs identify the same real-world point seen from two positions." },
  { label: "Camera motion",    title: "Camera motion estimation", desc: "From the matched pairs, the essential matrix is solved to recover the relative rotation R and translation t between frames." },
  { label: "Triangulation",    title: "Triangulation",            desc: "Each matched pair defines two optical rays. Where they intersect gives the 3D position of that landmark." },
  { label: "Point cloud",      title: "3D point cloud map",   desc: "All triangulated landmarks accumulate into a sparse 3D map. The sequence of estimated poses forms the camera trajectory." },
  { label: "Loop closure",     title: "Loop closure",         desc: "Recognising a previously seen place adds a constraint that corrects accumulated drift, bringing the whole map back into agreement. This keeps SLAM globally consistent over long trajectories.", bonus: true },
];

const N = steps.length;
const REGULAR = steps.filter(s => !s.bonus).length;   // numbered steps (bonus excluded)

const stepsCol   = document.getElementById('steps-col');
const trackCol   = document.getElementById('track-col');
const trackBg    = document.getElementById('track-bg');
const trackFill  = document.getElementById('track-fill');
const trackBonus = document.getElementById('track-bonus');

/* build the fixed-content sections (height is no longer fixed, content decides it) */
stepsCol.innerHTML = steps.map((s, i) => `
  <div class="step" id="step-${i}">
    <div class="step-img">${svgs[i]}</div>
    <div class="step-text">
      <div class="step-num${s.bonus ? ' bonus' : ''}">${s.bonus ? 'Bonus' : 'Step ' + (i + 1) + ' of ' + REGULAR}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
  </div>
`).join('');

/* build the always-visible nodes (positioned by JS, see layout()) */
const nodes = [];
for (let i = 0; i < N; i++) {
  const node = document.createElement('div');
  node.className = 'node';
  trackCol.insertBefore(node, document.getElementById('handle'));
  nodes.push(node);
}

let revealed = 1;   // number of visited sections (1..N)
let centers = [];   // vertical center (px, relative to track-col top) of each step, recomputed on layout

const tlEl = document.querySelector('.tl');
const TABLET_BP = 1000;  // px - real browser viewport width, not the iframe's own width
const PHONE_BP  = 480;

/* guards the same-origin assumption: if a future host ever embeds this
   cross-origin, window.parent.innerWidth throws - fall back gracefully
   to the iframe's own width rather than breaking the page. */
function inIframeSafe() {
  if (!window.frameElement) return false;
  try { void window.parent.innerWidth; return true; }
  catch (e) { return false; }
}

function getViewportWidth() {
  if (inIframeSafe()) {
    return window.parent.innerWidth || window.innerWidth;
  }
  return window.innerWidth;
}

function applyBreakpoint() {
  const vw = getViewportWidth();
  tlEl.classList.toggle('bp-tablet', vw <= TABLET_BP);
  tlEl.classList.toggle('bp-phone', vw <= PHONE_BP);
}

/* ----------------------------------------------------------------
   measure where each step actually rendered, and align the track
   (dots, line, fill) to those real positions - works for both the
   desktop row layout and the stacked mobile layout, at any text
   length, since nothing here assumes a fixed section height.
   ---------------------------------------------------------------- */
function measureCenters() {
  const trackTop = trackCol.getBoundingClientRect().top;
  const out = [];
  for (let i = 0; i < N; i++) {
    const r = document.getElementById('step-' + i).getBoundingClientRect();
    out.push(r.top - trackTop + r.height / 2);
  }
  return out;
}

function layout() {
  applyBreakpoint();
  centers = measureCenters();

  for (let i = 0; i < N; i++) {
    nodes[i].style.top = centers[i] + 'px';
  }

  const bgBottom = centers[REGULAR - 1];
  trackBg.style.top = '0px';
  trackBg.style.height = Math.max(0, bgBottom) + 'px';

  trackBonus.style.top = bgBottom + 'px';
  trackBonus.style.height = Math.max(0, centers[N - 1] - bgBottom) + 'px';

  const totalH = stepsCol.getBoundingClientRect().height;
  trackCol.style.height = totalH + 'px';

  reveal(revealed);
  reportHeight();
}

function reveal(count) {
  count = Math.max(1, Math.min(N, count));
  revealed = count;

  if (centers.length === N) {
    const idx = Math.min(count, REGULAR) - 1;
    const y = centers[idx];
    trackFill.style.height = Math.max(0, y) + 'px';
  }
  trackBonus.classList.toggle('active', count >= N);

  for (let i = 0; i < N; i++) {
    nodes[i].classList.toggle('active', i < count);
    document.getElementById('step-' + i).classList.toggle('visible', i < count);
  }
}

/* ---- reveal driven by the parent page's scroll position ----
   the component lives in a same-origin iframe, so it can read where it sits in
   the parent viewport; each step lights up once its centre scrolls past a
   trigger line partway down the screen. */
const inIframe = !!window.frameElement;
const TRIGGER = 0.62;   // fraction down the viewport where a step activates

function countFromScroll() {
  const frameTop = window.frameElement.getBoundingClientRect().top;
  const vh = window.parent.innerHeight || window.innerHeight;
  const line = vh * TRIGGER;
  let count = 0;
  for (let i = 0; i < N; i++) {
    const r = document.getElementById('step-' + i).getBoundingClientRect();
    if (frameTop + r.top + r.height / 2 <= line) count++;
  }
  return count;
}

function onScroll() { reveal(countFromScroll()); }

/* ---- self-sizing iframe ----
   The host no longer needs to hardcode a pixel height for this iframe:
   since the embed is same-origin, the component sets its own iframe's
   height to match its real rendered content, on load and whenever the
   layout changes (font load, orientation change, breakpoint switch). */
function reportHeight() {
  if (!inIframe) return;
  const total = Math.ceil(document.body.getBoundingClientRect().height);
  if (total > 0) window.frameElement.style.height = total + 'px';
}

let resizeTimer = null;
function scheduleLayout() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(layout, 50);
}

if (inIframe) {
  window.parent.addEventListener('scroll', onScroll, { passive: true });
  window.parent.addEventListener('resize', scheduleLayout, { passive: true });
}
window.addEventListener('resize', scheduleLayout, { passive: true });

/* re-measure automatically whenever the rendered size of the content
   changes (covers webfont swap, orientation change, breakpoint switch) */
if (window.ResizeObserver) {
  new ResizeObserver(scheduleLayout).observe(stepsCol);
} else {
  window.addEventListener('load', layout);
}

layout();
if (inIframe) {
  onScroll();
} else {
  reveal(N);   // opened standalone - just show everything
}
</script>
</body>
</html>
