<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* ===== RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ====================================================================
   SINGLE SOURCE OF TRUTH FOR GEOMETRY
   --------------------------------------------------------------------
   Every section has the exact same fixed height. The whole component
   height is therefore deterministic:

       component height = (--pad-y * 2) + (--section-h * 6)

   This MUST match the iframe height set in index.qmd:
       2 * 24px + 6 * 160px = 1008px
   ==================================================================== */
:root {
  --section-h: 160px;   /* fixed height of EVERY section */
  --pad-y: 24px;        /* vertical padding of the .tl wrapper */
  --sections: 6;        /* 5 pipeline steps + 1 bonus */
  --regular: 5;         /* numbered steps (the bonus is not counted) */
}

body {
  font-family: 'IBM Plex Mono', monospace;
  background-color: transparent;
  color: #cfe7d8;
  letter-spacing: 0.06em;
  position: relative;
}

/* ===== LAYOUT ===== */
.tl {
  display: flex;
  gap: 0;
  padding: var(--pad-y) 1.5rem;
  max-width: 750px;
  position: relative;
  z-index: 1;
}

/* ===== TRACK ===== */
.track-col {
  display: block;
  width: 32px;
  flex-shrink: 0;
  position: relative;
  margin-right: 1.5rem;

  /* exact, deterministic height: one full stack of sections */
  height: calc(var(--section-h) * var(--sections));
}

.track-bg {
  position: absolute;
  top: 0;
  /* solid track spans only the numbered steps (to the centre of step 5);
     the bonus segment beyond it is drawn dotted by .track-bonus */
  height: calc(var(--section-h) * (var(--regular) - 0.5));
  left: 50%;
  transform: translateX(-50%);
  width: 2px;

  background: linear-gradient(
    to bottom,
    rgba(207, 231, 216, 0.35),
    rgba(125, 255, 178, 0.10)
  );
  box-shadow: 0 0 6px rgba(0, 255, 136, 0.08);
}

.track-fill {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 0;

  background: #7dffb2;
  box-shadow:
    0 0 10px rgba(0, 255, 136, 0.35),
    0 0 18px rgba(0, 255, 136, 0.15);
  transition: height 0.18s ease;
}

/* dotted connector from the last numbered step down to the bonus step */
.track-bonus {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: calc((var(--regular) - 0.5) * var(--section-h));
  height: var(--section-h);
  width: 0;
  border-left: 2px dotted rgba(207, 231, 216, 0.3);
  transition: border-color 0.25s ease;
}
.track-bonus.active {
  border-left-color: #7dffb2;
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.18);
}

/* ===== NODES (one per section, always visible) ===== */
.node {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 11px;
  height: 11px;
  border-radius: 50%;
  z-index: 5;

  /* inactive (unvisited) look */
  background: #0b0f0e;
  border: 1.5px solid rgba(125, 255, 178, 0.4);
  transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.node.active {
  background: #7dffb2;
  border-color: #7dffb2;
  box-shadow:
    0 0 8px rgba(0, 255, 136, 0.55),
    0 0 16px rgba(0, 255, 136, 0.25);
}

/* step titles are always visible now, so the node-side preview is hidden */
.node-label {
  display: none;
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgb(125, 255, 178);
  pointer-events: none;
  transition: opacity 0.25s ease;
}

/* once visited, the real section title takes over - hide the preview */
.node.active .node-label {
  opacity: 0;
}

/* ===== HANDLE ===== */
.handle {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: none;   /* the latest node uses the normal "visited" style - no special handle */
  background: #0b0f0e;
  border: 1px solid #7dffb2;
  cursor: default;
  z-index: 10;
  top: 0;
  user-select: none;
  pointer-events: none;

  box-shadow: 0 0 10px rgba(0, 255, 136, 0.15);
  transition: top 0.18s ease, box-shadow 0.2s ease;
}

/* ===== SECTIONS ===== */
.steps-col {
  flex: 1;
}

/* each section: FIXED height, content vertically centered */
.step {
  height: var(--section-h);
  display: flex;
  gap: 1.25rem;
  align-items: center;

  opacity: 0.3;                       /* unvisited: visible but dimmed */
  transition: opacity 0.25s ease;
}

.step.visible {
  opacity: 1;                         /* visited: full */
}

/* ===== IMAGE PANELS ===== */
.step-img {
  width: 170px;
  height: calc(170px * 98 / 130);   /* match the SVG 130:98 aspect ratio — no letterbox bars */
  flex-shrink: 0;
  border-radius: 6px;
  background: transparent;
  border: 1px solid rgb(0, 255, 136);
  overflow: hidden;
  filter: grayscale(1);               /* unvisited thumbnails are greyed out */
  transition: filter 0.25s ease;
}

.step.visible .step-img { filter: none; }

.step-img svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ===== TEXT ===== */
.step-text { flex: 1; }

.step-num {
  font-size: 11px;
  color: rgba(207, 231, 216, 0.6);
  font-weight: 500;
  margin-bottom: 5px;
  letter-spacing: 0.08em;
}

.step-num.bonus {
  color: #f5b14a;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 600;
}

.step-title {
  font-size: 15px;
  font-weight: 600;
  color: #7dffb2;
  margin-bottom: 6px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.12);
}

.step-desc {
  font-size: 13px;
  color: #cfe7d8;
  line-height: 1.7;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

  <!-- vertical track -->
  <div class="track-col" id="track-col">
    <div class="track-bg"></div>
    <div class="track-fill" id="track-fill"></div>

    <!-- nodes + handle injected by JS -->

const steps = [
  { label: "ORB features",     title: "ORB feature detection",   desc: "From the camera's stream of frames, distinctive keypoints (corners, blobs) are detected and each is encoded as a compact binary descriptor." },
  { label: "Feature matching", title: "Feature matching",         desc: "Descriptors from consecutive frames are compared by Hamming distance. Matched pairs identify the same real-world point seen from two positions." },
  { label: "Camera motion",    title: "Camera motion estimation", desc: "From the matched pairs, the essential matrix is solved to recover the relative rotation R and translation t between frames." },
  { label: "Triangulation",    title: "Triangulation",            desc: "Each matched pair defines two optical rays. Where they intersect gives the 3D position of that landmark." },
  { label: "Point cloud",      title: "3D point cloud map",   desc: "All triangulated landmarks accumulate into a sparse 3D map. The sequence of estimated poses forms the camera trajectory." },
  { label: "Loop closure",     title: "Loop closure",         desc: "Recognising a previously seen place adds a constraint that corrects accumulated drift, bringing the whole map back into agreement. This keeps SLAM globally consistent over long trajectories.", bonus: true },
];

/* ---- geometry: read the fixed section height straight from CSS ---- */
const SECTION_H = parseFloat(
  getComputedStyle(document.documentElement).getPropertyValue('--section-h')
);
const N = steps.length;
const REGULAR = steps.filter(s => !s.bonus).length;   // numbered steps (bonus excluded)

/* center of section i (relative to the track-col / steps-col top) */
const nodeCenter = i => (i + 0.5) * SECTION_H;

const stepsCol   = document.getElementById('steps-col');
const trackCol   = document.getElementById('track-col');
const trackFill  = document.getElementById('track-fill');
const trackBonus = document.getElementById('track-bonus');
const handle     = document.getElementById('handle');

/* build the fixed-height sections */
stepsCol.innerHTML = steps.map((s, i) => `
  <div class="step" id="step-${i}">
    <div class="step-img">${svgs[i]}</div>
    <div class="step-text">
      <div class="step-num${s.bonus ? ' bonus' : ''}">${s.bonus ? 'Bonus' : 'Step ' + (i + 1) + ' of ' + REGULAR}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
  </div>
`).join('');

/* build the always-visible nodes, perfectly aligned to section centers */
const nodes = [];
for (let i = 0; i < N; i++) {
  const node = document.createElement('div');
  node.className = 'node';
  node.style.top = nodeCenter(i) + 'px';

  const label = document.createElement('div');
  label.className = 'node-label';
  label.textContent = steps[i].title;
  node.appendChild(label);

  trackCol.insertBefore(node, handle);
  nodes.push(node);
}

let revealed = 1; // number of visited sections (1..N)

function reveal(count) {
  count = Math.max(1, Math.min(N, count));
  revealed = count;

  // green solid fill only spans the numbered steps; the bonus link stays dotted
  const y = nodeCenter(Math.min(count, REGULAR) - 1);

  handle.style.top    = y + 'px';
  trackFill.style.height = y + 'px';
  trackBonus.classList.toggle('active', count >= N);   // dotted link turns green once the bonus is reached

  for (let i = 0; i < N; i++) {
    nodes[i].classList.toggle('active', i < count);
    document.getElementById('step-' + i).classList.toggle('visible', i < count);
  }
}

/* ---- reveal driven by the parent page's scroll position ----
   the component lives in a same-origin iframe, so it can read where it sits in
   the parent viewport; each step lights up once its centre scrolls past a
   trigger line partway down the screen. */
const inIframe = !!window.frameElement;
const TRIGGER = 0.62;   // fraction down the viewport where a step activates

function countFromScroll() {
  const frameTop = window.frameElement.getBoundingClientRect().top;
  const vh = window.parent.innerHeight || window.innerHeight;
  const line = vh * TRIGGER;
  let count = 0;
  for (let i = 0; i < N; i++) {
    const r = document.getElementById('step-' + i).getBoundingClientRect();
    if (frameTop + r.top + r.height / 2 <= line) count++;
  }
  return count;
}

function onScroll() { reveal(countFromScroll()); }

if (inIframe) {
  window.parent.addEventListener('scroll', onScroll, { passive: true });
  window.parent.addEventListener('resize', onScroll, { passive: true });
  onScroll();
} else {
  reveal(N);   // opened standalone - just show everything
}
</script>
